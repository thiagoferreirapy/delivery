<!--
  Cabana Lanches — Tela de onboarding
  Mesma animação do vídeo (fade-up + motion blur + stagger palavra por palavra),
  em HTML/CSS puro. Pronta pra Capacitor (WebView).

  Como editar:
    • Textos: troque direto no HTML abaixo (título em <span> por palavra).
    • Tempo: variáveis --t-* no :root controlam início/stagger/duração.
    • Fundo: ./cabana-bg.mp4 (troque pelo seu vídeo/imagem).
    • Offline no app: baixe o Poppins e troque o <link> do Google Fonts por
      @font-face local em /assets/fonts (recomendado no Capacitor).
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cabana Lanches</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    /* palette — warm delivery, casa do lanche à noite */
    --title:   #FFF7EE;
    --sub:     #F0E7DC;
    --eyebrow: #FFAD78;
    --accent:  #FF8A3A;
    --ink:     #0a0605;

    /* timeline (segundos) — espelha o vídeo */
    --t-eyebrow: .25s;
    --t-title:   .55s;   /* início da 1ª palavra */
    --t-stagger: .12s;   /* atraso entre palavras */
    --t-word:    .8s;    /* duração de cada palavra */
    --t-accent:  1.45s;
    --t-sub:     1.75s;
    --t-cta:     2.4s;

    --ease: cubic-bezier(.16, 1, .3, 1); /* ease-out cinematográfico */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; background: var(--ink); }

  .stage {
    position: fixed; inset: 0;
    overflow: hidden;
    font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--title);
    /* respeita notch/safe-area no app */
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* fundo em vídeo, cobrindo a tela (crop nos lados no portrait) */
  .bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scale(1.02);
    animation: breathe 24s ease-in-out infinite alternate;
  }
  @keyframes breathe { to { transform: scale(1.1); } }

  /* scrim quente pra legibilidade sem esconder a comida */
  .scrim {
    position: absolute; inset: 0;
    background:
      radial-gradient(120% 80% at 50% 8%, rgba(8,5,4,.72), transparent 60%),
      linear-gradient(180deg, rgba(8,5,4,.68) 0%, rgba(8,5,4,.15) 40%,
                                rgba(8,5,4,.35) 72%, rgba(8,5,4,.85) 100%);
  }

  .content {
    position: relative;
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
    padding: clamp(56px, 12vh, 120px) 24px 40px;
  }

  /* ---------- eyebrow ---------- */
  .eyebrow {
    font-weight: 500;
    font-size: clamp(12px, 1.6vw, 15px);
    letter-spacing: .42em;
    text-indent: .42em;               /* compensa o tracking no centro */
    color: var(--eyebrow);
    text-transform: uppercase;
    margin-bottom: clamp(14px, 2.4vh, 22px);
    opacity: 0;
    animation: rise-blur var(--t-word) var(--ease) both;
    animation-delay: var(--t-eyebrow);
    --rise: 18px; --blur: 6px;
  }

  /* ---------- título ---------- */
  .title {
    font-weight: 700;
    line-height: 1.02;
    letter-spacing: -.015em;
    font-size: clamp(40px, 9.2vw, 82px);
    text-shadow: 0 6px 26px rgba(0,0,0,.55);
  }
  .title .line { display: block; }
  .title .word {
    display: inline-block;
    opacity: 0;
    animation: rise-blur var(--t-word) var(--ease) both;
    /* --i = índice da palavra (0..n) definido inline */
    animation-delay: calc(var(--t-title) + var(--i) * var(--t-stagger));
    --rise: 48px; --blur: 12px;
  }

  /* ---------- linha de destaque ---------- */
  .accent {
    height: 4px; width: 0;
    border-radius: 2px;
    background: var(--accent);
    margin: clamp(16px, 2.6vh, 24px) 0 clamp(16px, 2.4vh, 22px);
    box-shadow: 0 0 18px rgba(255,138,58,.6);
    animation: grow-line .7s var(--ease) both;
    animation-delay: var(--t-accent);
  }

  /* ---------- subtítulo ---------- */
  .subtitle {
    font-weight: 300;
    font-size: clamp(15px, 2.4vw, 20px);
    line-height: 1.5;
    color: var(--sub);
    max-width: 34ch;
    text-shadow: 0 2px 14px rgba(0,0,0,.5);
    opacity: 0;
    animation: rise-blur 1s var(--ease) both;
    animation-delay: var(--t-sub);
    --rise: 30px; --blur: 8px;
  }

  /* ---------- ação + paginação ---------- */
  .actions {
    margin-top: auto;
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(18px, 3vh, 26px);
    opacity: 0;
    animation: rise-blur .9s var(--ease) both;
    animation-delay: var(--t-cta);
    --rise: 24px; --blur: 0px;
  }
  .cta {
    appearance: none; border: 0; cursor: pointer;
    font-family: inherit; font-weight: 700;
    font-size: clamp(15px, 2.2vw, 17px);
    color: #2a1405;
    padding: 15px 40px;
    border-radius: 999px;
    background: linear-gradient(180deg, #FFB067, var(--accent));
    box-shadow: 0 10px 30px rgba(255,138,58,.4), inset 0 1px 0 rgba(255,255,255,.4);
    transition: transform .18s var(--ease), box-shadow .18s var(--ease);
  }
  .cta:hover  { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(255,138,58,.5); }
  .cta:active { transform: translateY(0); }
  .cta:focus-visible { outline: 3px solid #fff; outline-offset: 3px; }

  .dots { display: flex; gap: 8px; }
  .dots i {
    width: 7px; height: 7px; border-radius: 999px;
    background: rgba(255,255,255,.35);
    transition: width .3s var(--ease), background .3s var(--ease);
  }
  .dots i.on { width: 22px; background: var(--accent); }

  /* ---------- keyframes ---------- */
  @keyframes rise-blur {
    from { opacity: 0; transform: translateY(var(--rise, 40px)); filter: blur(var(--blur, 10px)); }
    to   { opacity: 1; transform: translateY(0);                filter: blur(0); }
  }
  @keyframes grow-line { to { width: 92px; } }

  /* acessibilidade: sem motion, aparece direto */
  @media (prefers-reduced-motion: reduce) {
    .bg { animation: none; }
    .eyebrow, .title .word, .subtitle, .actions {
      animation: none; opacity: 1; transform: none; filter: none;
    }
    .accent { animation: none; width: 92px; }
  }
</style>

<div class="stage">
  <video class="bg" src="./cabana-bg.mp4" autoplay muted loop playsinline
         poster="" aria-hidden="true"></video>
  <div class="scrim"></div>

  <div class="content">
    <p class="eyebrow">Cabana Lanches</p>

    <h1 class="title">
      <span class="line">
        <span class="word" style="--i:0">Seus</span>
        <span class="word" style="--i:1">lanches</span>
      </span>
      <span class="line">
        <span class="word" style="--i:2">na</span>
        <span class="word" style="--i:3">palma</span>
        <span class="word" style="--i:4">da</span>
        <span class="word" style="--i:5">mão</span>
      </span>
    </h1>

    <div class="accent"></div>

    <p class="subtitle">
      Peça em segundos, acompanhe sua entrega em tempo real
      e aproveite seus pedidos favoritos onde estiver.
    </p>

    <div class="actions">
      <button class="cta" type="button">Ver cardápio</button>
      <div class="dots" aria-hidden="true">
        <i class="on"></i><i></i><i></i>
      </div>
    </div>
  </div>
</div>
